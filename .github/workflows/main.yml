name: Go CI

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build Windows EXE on Ubuntu
    runs-on: ubuntu-latest

    steps:
      # Checkout repository source code
      - name: Checkout code
        uses: actions/checkout@v4

      # Install Go toolchain using official action
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      # Ensure module metadata is clean and reproducible
      - name: Tidy modules
        run: go mod tidy

      # Download all module dependencies explicitly
      - name: Download dependencies
        run: go mod download

      # Cross-compile Windows executable (.exe) while running on Ubuntu
      - name: Build Windows executable
        run: |
          mkdir -p bin
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -v -o bin/forge.exe ./

      # Create a Windows launcher so users can double-click and keep a terminal open
      - name: Create Windows launcher
        run: |
          cat > bin/run-forge.bat << 'EOF'
          @echo off
          cd /d "%~dp0"
          echo Starting forge...
          echo.
          forge.exe
          echo.
          pause
          EOF

      # Upload build outputs as artifact
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: forge-windows-exe
          path: |
            bin/forge.exe
            bin/run-forge.bat
          if-no-files-found: error
